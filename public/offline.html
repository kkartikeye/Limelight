<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline · Limelight</title>
<style>
  body {
    margin: 0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #f6f3ec; color: #181613;
    font-family: "Manrope", system-ui, sans-serif;
    text-align: center; padding: 24px;
  }
  .mark { position: relative; width: 44px; height: 44px; margin-bottom: 20px; }
  .mark div { position: absolute; border-radius: 999px; }
  .o { inset: 0; background: #e0573c; }
  .p { inset: 8px; background: #f6f3ec; }
  .d { inset: 14px; background: #e0573c; }
  h1 { font-family: Georgia, serif; font-weight: 400; font-size: 28px; letter-spacing: -0.5px; margin: 0 0 8px; }
  p  { color: #7a7568; font-size: 14px; margin: 0 0 20px; max-width: 320px; line-height: 1.5; }
  button {
    background: #181613; color: #f6f3ec; border: none; border-radius: 999px;
    padding: 10px 22px; font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
  <div class="mark"><div class="o"></div><div class="p"></div><div class="d"></div></div>
  <h1>You&rsquo;re offline</h1>
  <p>Limelight needs a connection to load live coverage. Reconnect and try again.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
