<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Limelight — Daylight, full product surface</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; background: #efeadf; color: #181613; font-family: "Manrope", system-ui, sans-serif; }
  #root { height: 100vh; }
</style>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- d3-geo + topojson-client -->
<script src="https://unpkg.com/d3-array@3.2.4/dist/d3-array.min.js"></script>
<script src="https://unpkg.com/d3-geo@3.1.1/dist/d3-geo.min.js"></script>
<script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
</head>
<body>

<div id="root"></div>

<!-- World data + map component -->
<script type="text/babel" src="world.jsx"></script>

<!-- Daylight system + screens -->
<script type="text/babel" src="daylight-shared.jsx"></script>
<script type="text/babel" src="daylight-home.jsx"></script>
<script type="text/babel" src="daylight-country.jsx"></script>
<script type="text/babel" src="daylight-article.jsx"></script>
<script type="text/babel" src="daylight-mobile.jsx"></script>

<!-- Design canvas host -->
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="env,react">
  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="daylight"
          title="Daylight — full product surface"
          subtitle="Drag to pan · scroll to zoom · double-click ⤢ on any artboard for fullscreen. Same design system across every screen."
        >
          <DCArtboard id="home-globe" label="Home · Globe (default)"    width={1280} height={800}>
            <DaylightHome view="globe" />
          </DCArtboard>
          <DCArtboard id="home-flat"  label="Home · Flat (toggle)"      width={1280} height={800}>
            <DaylightHome view="flat" />
          </DCArtboard>
          <DCArtboard id="country"    label="Country focus · Iran"      width={1280} height={800}>
            <DaylightCountry />
          </DCArtboard>
          <DCArtboard id="article"    label="Article reader"            width={1280} height={800}>
            <DaylightArticle />
          </DCArtboard>
          <DCArtboard id="mobile"     label="Mobile · Home"             width={418} height={872}>
            <DaylightMobile />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
