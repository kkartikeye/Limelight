<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="heat" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#e31a1c"/>
      <stop offset="45%"  stop-color="#fd8d3c"/>
      <stop offset="100%" stop-color="#ffffcc" stop-opacity="0.25"/>
    </radialGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0d0d0d"/>

  <!-- Globe fill -->
  <circle cx="16" cy="16" r="11" fill="url(#heat)"/>

  <!-- Globe outline -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>

  <!-- Latitude line -->
  <ellipse cx="16" cy="16" rx="11" ry="4.5"
    fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>

  <!-- Meridian line -->
  <line x1="16" y1="5" x2="16" y2="27"
    stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
</svg>
